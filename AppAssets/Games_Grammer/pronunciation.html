<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak & Learn Playzone</title>
    <style>
        :root {
            --primary: #4A90E2;
            --primary-hover: #357ABD;
            --success: #2ECC71;
            --accent: #FFE11A;
            --bg-gradient: linear-gradient(135deg, #74EBD5 0%, #9ACBFC 100%);
            --text-dark: #2C3E50;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* --- Loading / Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .splash-logo {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--success);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            display: none; /* Shown once app config loads */
        }
        .btn-start:hover { transform: scale(1.05); }

        /* --- Main Layout --- */
        .app-container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            margin: 20px;
        }

        /* --- Header / Score --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .progress-bar {
            background: #E0E0E0;
            border-radius: 10px;
            height: 12px;
            width: 60%;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .btn-exit {
            background: #E74C3C;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Text Display Area --- */
        .sentence-box {
            font-size: 2rem;
            line-height: 1.6;
            margin: 40px 0;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .word {
            display: inline-block;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
            user-select: none;
        }
        .word:hover {
            background-color: rgba(74, 144, 226, 0.15);
            color: var(--primary);
        }
        .word.highlight {
            background-color: var(--accent) !important;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* --- Navigation Controls --- */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-action {
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: white;
        }

        .btn-listen { background: var(--primary); }
        .btn-listen:hover { background: var(--primary-hover); }
        .btn-next { background: var(--success); }
        .btn-next:hover { background: #27AE60; }

        /* --- Custom Dialog / Popup --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 85%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        .modal h3 { margin-bottom: 15px; color: var(--text-dark); }
        .modal p { margin-bottom: 20px; color: #7F8C8D; }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-modal {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-confirm { background: #E74C3C; color: white; }
        .btn-cancel { background: #BDC3C7; color: var(--text-dark); }

        /* --- Animations --- */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- Responsive Viewports --- */
        @media (max-width: 768px) {
            .sentence-box { font-size: 1.6rem; }
            .btn-action { padding: 12px 20px; font-size: 1rem; }
        }
        @media (max-width: 480px) {
            .app-container { padding: 20px; width: 95%; }
            .sentence-box { font-size: 1.3rem; margin: 25px 0; }
            .controls { flex-direction: column; gap: 10px; }
            .btn-action { width: 100%; justify-content: center; }
            .header { flex-direction: column-reverse; gap: 15px; }
            .progress-bar { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">🗣️ Learn & Play!</div>
        <div class="spinner" id="splash-spinner"></div>
        <button class="btn-start" id="btn-start" onclick="initializeApp()">Let's Play! 🎉</button>
    </div>

    <div class="app-container">
        <div class="header">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <button class="btn-exit" onclick="showExitModal()">Reset Game ↩</button>
        </div>

        <div class="sentence-box" id="sentence-box">
            </div>

        <div class="controls">
            <button class="btn-action btn-listen" onclick="speakCurrentSentence()">
                🔊 Listen Whole Sentence
            </button>
            <button class="btn-action btn-next" onclick="nextSentence()">
                Next Sentence ➡️
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="exit-modal">
        <div class="modal">
            <h3>Are you sure you want to restart?</h3>
            <p>You will lose your current game progression!</p>
            <div class="modal-buttons">
                <button class="btn-modal btn-confirm" onclick="confirmExit()">Yes, Restart</button>
                <button class="btn-modal btn-cancel" onclick="closeExitModal()">No, Keep Playing</button>
            </div>
        </div>
    </div>

    <script>
        
    </script>
    <script src="pronunciation.min.js"></script>
</body>
</html>
